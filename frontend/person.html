<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Person — Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<header>
  <div class="logo">🕵️ Vault</div>
  <nav><a href="/">← All People</a></nav>
</header>

<div class="page">
  <a class="back-link" href="/">← Back to vault</a>

  <div id="hero-section"></div>
  <hr/>
  <div id="fields-section"></div>
  <hr/>
  <div id="media-section"></div>
  <hr/>

  <!-- Add panels -->
  <div class="add-panels">

    <!-- Add Field -->
    <div class="add-panel">
      <h3>➕ Add Info Field</h3>
      <form id="add-field-form">
        <div class="form-group">
          <label>Field Type</label>
          <select name="field_type">
            <optgroup label="── Social ──">
              <option value="instagram">📸 Instagram</option>
              <option value="snapchat">👻 Snapchat</option>
              <option value="twitter">𝕏 X / Twitter</option>
              <option value="linkedin">💼 LinkedIn URL</option>
              <option value="pinterest">📌 Pinterest</option>
              <option value="facebook">📘 Facebook URL</option>
              <option value="tiktok">🎵 TikTok</option>
              <option value="youtube">▶️ YouTube URL</option>
              <option value="telegram">✈️ Telegram</option>
              <option value="discord">🎮 Discord Tag</option>
              <option value="reddit">🤖 Reddit</option>
              <option value="threads">🧵 Threads</option>
              <option value="bereal">📷 BeReal</option>
              <option value="spotify">🎧 Spotify</option>
            </optgroup>
            <optgroup label="── Contact ──">
              <option value="phone">📞 Phone</option>
              <option value="email">📧 Email</option>
              <option value="whatsapp">💬 WhatsApp</option>
            </optgroup>
            <optgroup label="── Identity ──">
              <option value="nickname">🏷 Nickname</option>
              <option value="dob">🎂 Date of Birth</option>
              <option value="gender">⚧ Gender</option>
            </optgroup>
            <optgroup label="── Education ──">
              <option value="school">🏫 School</option>
              <option value="college">🎓 College</option>
            </optgroup>
            <optgroup label="── Work ──">
              <option value="workplace">🏢 Workplace</option>
              <option value="jobtitle">💼 Job Title</option>
              <option value="github">🐙 GitHub Username</option>
              <option value="website">🌐 Website</option>
            </optgroup>
            <optgroup label="── Location ──">
              <option value="location">📍 Location</option>
              <option value="address">🏠 Address</option>
            </optgroup>
            <optgroup label="── Music ──">
              <option value="fav_song">🎵 Favourite Song</option>
              <option value="fav_artist">🎤 Favourite Artist</option>
              <option value="fav_album">💿 Favourite Album</option>
              <option value="music_taste">🎼 Music Taste / Genre</option>
            </optgroup>
            <optgroup label="── Misc ──">
              <option value="note">📝 Note</option>
              <option value="tag">🔖 Tag</option>
              <option value="custom">✏️ Custom</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label>Value</label>
          <input type="text" name="value" placeholder="Enter value..." required/>
        </div>
        <div class="form-group">
          <label>Label <span style="color:var(--muted);font-size:0.72rem;font-weight:400;text-transform:none;">(optional — e.g. "main", "work")</span></label>
          <input type="text" name="label" placeholder="optional label"/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Add Field</button>
      </form>
    </div>

    <!-- Add Media -->
    <div class="add-panel">
      <h3>📎 Add Media / File</h3>
      <form id="add-media-form" enctype="multipart/form-data">
        <div class="form-group">
          <label>Type</label>
          <select name="media_type" id="media-type-select">
            <option value="profile_pic">🧑 Profile Picture</option>
            <option value="photo">🖼 Photo</option>
            <option value="screenshot">📸 Screenshot</option>
            <option value="video">🎬 Video</option>
            <option value="audio">🎵 Audio / Music</option>
            <option value="repo_url">🐙 GitHub Repo URL</option>
            <option value="repo_zip">📦 Repo ZIP</option>
            <option value="other">📎 Other File</option>
          </select>
        </div>

        <!-- File upload -->
        <div id="media-file-group">
          <div class="form-group">
            <label>Files <span style="color:var(--muted);font-size:0.72rem;font-weight:400;text-transform:none;" id="multi-hint">(select multiple)</span></label>
            <label class="file-label">
              📂 Click or drag files here
              <input type="file" id="media-file-input" accept="image/*" multiple/>
            </label>
            <div class="multi-preview" id="multi-preview"></div>
          </div>
        </div>

        <!-- Repo URL -->
        <div id="media-url-group" style="display:none">
          <div class="form-group">
            <label>GitHub Repo URL</label>
            <input type="url" name="repo_url" placeholder="https://github.com/user/repo"/>
          </div>
        </div>

        <div class="form-group">
          <label>Caption <span style="color:var(--muted);font-size:0.72rem;font-weight:400;text-transform:none;">(optional)</span></label>
          <input type="text" name="caption" placeholder="e.g. mirror selfie jan 2025"/>
        </div>

        <div class="upload-bar" id="upload-bar"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.75rem" id="upload-btn">Upload</button>
      </form>
    </div>

  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close">✕</button>
  <img id="lightbox-img" src="" alt=""/>
</div>

<div class="toast" id="toast"></div>
<script src="/static/person.js"></script>
</body>
</html>
