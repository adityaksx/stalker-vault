<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vault</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<header>
  <div class="logo">🕵️ <span>Vault</span></div>
  <nav>
    <span id="count-badge" class="count-badge">0 people</span>
  </nav>
</header>

<div class="page">

  <div class="page-header">
    <h1>People</h1>
    <div style="display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap;">
      <input
        id="search-input"
        type="text"
        placeholder="Search name, handle, tag..."
        style="background:#111; border:1px solid #2a2a2a; border-radius:8px;
               color:#e8e8e8; font-size:0.88rem; padding:0.55rem 0.9rem;
               outline:none; width:220px;"
      />
      <button class="btn btn-primary" id="add-btn">+ Add Person</button>
    </div>
  </div>

  <div id="people-grid" class="people-grid"></div>

</div>

<!-- Modal — name only -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>➕ New Person</h2>
    <form id="add-form">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" name="name" placeholder="Full name" required autofocus/>
      </div>
      <p style="color:var(--muted); font-size:0.82rem; margin-bottom:1.2rem; line-height:1.6;">
        Add all other info — social handles, phone, screenshots, etc. — on the person's page after creating.
      </p>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="modal-close">Cancel</button>
        <button type="submit" class="btn btn-primary">Create →</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/index.js"></script>
</body>
</html>
