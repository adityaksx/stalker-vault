<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Vault – personal people tracker"/>
  <title>Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕵️</text></svg>"/>
</head>
<body>

<header>
  <div class="logo">🕵️ Vault</div>
  <nav>
    <span id="count-badge" class="count-badge">0 people</span>
  </nav>
</header>

<div class="page">
  <div class="page-header">
    <h1>People</h1>
    <div style="display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap;">
      <input id="search-input" type="text" class="search-input" placeholder="🔍 Search name, handle, tag..."/>
      <button class="btn btn-primary" id="add-btn">＋ Add Person</button>
    </div>
  </div>
  <div id="people-grid" class="people-grid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>✨ New Person</h2>
    <form id="add-form">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" name="name" placeholder="Full name" required autofocus/>
      </div>
      <p style="color:var(--muted); font-size:0.82rem; margin-bottom:1.2rem; line-height:1.6;">
        Add socials, phone, photos and more on the person's page after creating.
      </p>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="modal-close">Cancel</button>
        <button type="submit" class="btn btn-primary">Create →</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/static/index.js"></script>
</body>
</html>
